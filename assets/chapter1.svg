<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#388bfd;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a371f7;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- bg -->
  <rect width="800" height="400" fill="#010409" rx="12"/>
  <rect x="1" y="1" width="798" height="398" fill="none" stroke="#21262d" stroke-width="1" rx="11"/>

  <!-- header label -->
  <text x="36" y="48" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#8b949e" letter-spacing="3">THE NUMBERS</text>
  <text x="764" y="48" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#8b949e" letter-spacing="2" text-anchor="end">LAST 365 DAYS</text>
  <rect x="36" y="58" width="220" height="1" fill="url(#lg1)"/>

  <!-- stat 1 — total commits -->
  <text x="145" y="160" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="58" font-weight="700"
        fill="#e6edf3" text-anchor="middle" filter="url(#glow1)">89</text>
  <text x="145" y="182" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#8b949e"
        text-anchor="middle" letter-spacing="3">COMMITS</text>

  <line x1="272" y1="105" x2="272" y2="200" stroke="#21262d" stroke-width="1"/>

  <!-- stat 2 — peak hour -->
  <text x="450" y="152" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="46" font-weight="700"
        fill="#388bfd" text-anchor="middle" filter="url(#glow1)">2 AM</text>
  <text x="450" y="174" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#8b949e"
        text-anchor="middle" letter-spacing="3">PEAK HOUR</text>
  <text x="450" y="192" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#a371f7"
        text-anchor="middle">— dini hari. compiler jadi satu-satunya temen —</text>

  <line x1="590" y1="105" x2="590" y2="200" stroke="#21262d" stroke-width="1"/>

  <!-- stat 3 — most active day -->
  <text x="700" y="152" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="26" font-weight="700"
        fill="#f0883e" text-anchor="middle" filter="url(#glow1)">Sunday</text>
  <text x="700" y="174" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#8b949e"
        text-anchor="middle" letter-spacing="2">MOST ACTIVE</text>

  <!-- vibe divider -->
  <rect x="36" y="213" width="728" height="1" fill="#21262d"/>
  <text x="400" y="252" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#8b949e"
        text-anchor="middle" font-style="italic">&quot;compiler jadi saksi bisu jam segini.&quot;</text>

  <!-- activity spread -->
  <text x="36" y="294" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#8b949e" letter-spacing="2">HOURLY ACTIVITY</text>
  <rect x="36" y="300" width="728" height="1" fill="#21262d" opacity="0.35"/>

  <rect x="43" y="313" width="24" height="25" fill="#21262d" rx="3" opacity="0.65"/>
  <rect x="73" y="310" width="24" height="28" fill="#21262d" rx="3" opacity="0.65"/>
  <rect x="103" y="306" width="24" height="32" fill="#388bfd" rx="3" opacity="1"/>
  <rect x="133" y="310" width="24" height="28" fill="#21262d" rx="3" opacity="0.65"/>
  <rect x="163" y="313" width="24" height="25" fill="#21262d" rx="3" opacity="0.65"/>
  <rect x="193" y="316" width="24" height="22" fill="#21262d" rx="3" opacity="0.65"/>
  <rect x="223" y="319" width="24" height="19" fill="#21262d" rx="3" opacity="0.65"/>
  <rect x="253" y="322" width="24" height="16" fill="#21262d" rx="3" opacity="0.65"/>
  <rect x="283" y="326" width="24" height="12" fill="#21262d" rx="3" opacity="0.65"/>
  <rect x="313" y="329" width="24" height="9" fill="#21262d" rx="3" opacity="0.65"/>
  <rect x="343" y="332" width="24" height="6" fill="#21262d" rx="3" opacity="0.65"/>
  <rect x="373" y="335" width="24" height="3" fill="#21262d" rx="3" opacity="0.65"/>
  <text x="55" y="353" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#8b949e" text-anchor="middle">00</text>
  <text x="235" y="353" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#8b949e" text-anchor="middle">06</text>
  <text x="415" y="353" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#8b949e" text-anchor="middle">12</text>
  <text x="595" y="353" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#8b949e" text-anchor="middle">18</text>
  <text x="745" y="353" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#8b949e" text-anchor="middle">23</text>

</svg>
