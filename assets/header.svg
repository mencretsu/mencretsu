<svg width="100%" viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- sweep glow gradient for line -->
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4493F8" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#4493F8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#4493F8" stop-opacity="0.6"/>
      <stop offset="65%"  stop-color="#4493F8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4493F8" stop-opacity="0"/>
    </linearGradient>
    <!-- constrain sweep to line bounds -->
    <clipPath id="lineclip">
      <rect x="40" y="109" width="720" height="12"/>
    </clipPath>
  </defs>

  <style>
    /* ── intro ─────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
    @keyframes appear {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /*
     * ── glitch loop ─────────────────────────────────────
     * 7s cycle. glitch burst = 0–5% (~350ms), silent rest.
     * steps(1,end) inside each keyframe = instant jump, no lerp.
     */
    @keyframes gl1 {
      0% {
        clip-path:inset(0 0 100% 0); opacity:0; transform:translate(0);
        animation-timing-function: steps(1,end);
      }
      0.8% {
        clip-path:inset(12% 0 68% 0); transform:translate(-5px); opacity:.8;
        animation-timing-function: steps(1,end);
      }
      1.4% {
        clip-path:inset(58% 0 22% 0); transform:translate(5px);  opacity:.8;
        animation-timing-function: steps(1,end);
      }
      2.0% {
        clip-path:inset(35% 0 45% 0); transform:translate(-3px); opacity:.8;
        animation-timing-function: steps(1,end);
      }
      2.6% {
        clip-path:inset(78% 0  5% 0); transform:translate(4px);  opacity:.8;
        animation-timing-function: steps(1,end);
      }
      3.2% {
        clip-path:inset( 5% 0 80% 0); transform:translate(-4px); opacity:.6;
        animation-timing-function: steps(1,end);
      }
      3.8% {
        clip-path:inset(48% 0 32% 0); transform:translate(3px);  opacity:.6;
        animation-timing-function: steps(1,end);
      }
      4.4% {
        clip-path:inset(22% 0 62% 0); transform:translate(-2px); opacity:.5;
        animation-timing-function: steps(1,end);
      }
      5.0%, 100% {
        clip-path:inset(0 0 100% 0); opacity:0; transform:translate(0);
      }
    }
    @keyframes gl2 {
      0% {
        clip-path:inset(0 0 100% 0); opacity:0; transform:translate(0);
        animation-timing-function: steps(1,end);
      }
      1.1% {
        clip-path:inset(42% 0 38% 0); transform:translate(5px);  opacity:.6;
        animation-timing-function: steps(1,end);
      }
      1.7% {
        clip-path:inset( 8% 0 78% 0); transform:translate(-5px); opacity:.6;
        animation-timing-function: steps(1,end);
      }
      2.3% {
        clip-path:inset(72% 0 12% 0); transform:translate(3px);  opacity:.6;
        animation-timing-function: steps(1,end);
      }
      2.9% {
        clip-path:inset( 2% 0 82% 0); transform:translate(-3px); opacity:.55;
        animation-timing-function: steps(1,end);
      }
      3.5% {
        clip-path:inset(55% 0 28% 0); transform:translate(4px);  opacity:.45;
        animation-timing-function: steps(1,end);
      }
      4.2% {
        clip-path:inset(18% 0 65% 0); transform:translate(-2px); opacity:.4;
        animation-timing-function: steps(1,end);
      }
      5.0%, 100% {
        clip-path:inset(0 0 100% 0); opacity:0; transform:translate(0);
      }
    }

    /* subtle name flicker synced to glitch burst */
    @keyframes nameFlicker {
      0%, 5.1%, 100% { opacity:1; }
      0.8%  { opacity:.88; }
      1.7%  { opacity:.94; }
      2.6%  { opacity:.85; }
      3.5%  { opacity:.92; }
      4.4%  { opacity:.88; }
    }

    /* ── classes ────────────────────────────────────────── */
    .name {
      font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
      font-size: 80px; font-weight: 900; letter-spacing: -4px;
      fill: #ffffff;
      animation:
        fadeUp      0.55s cubic-bezier(0.16,1,0.3,1) 0.05s both,
        nameFlicker 7s   linear                       1.6s  infinite;
    }
    .glitch-r {
      font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
      font-size: 80px; font-weight: 900; letter-spacing: -4px;
      fill: #4493F8; opacity:0;
      animation:
        fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) 0.05s both,
        gl1    7s   linear                       1.6s  infinite;
    }
    .glitch-g {
      font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
      font-size: 80px; font-weight: 900; letter-spacing: -4px;
      fill: #3fb950; opacity:0;
      animation:
        fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) 0.05s both,
        gl2    7s   linear                       1.6s  infinite;
    }
    .accent {
      stroke-dasharray: 760; stroke-dashoffset: 760;
      animation: drawLine 0.9s cubic-bezier(0.4,0,0.2,1) 0.45s forwards;
    }
    .sub {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12.5px; fill: #8b949e; letter-spacing: 0.8px;
      animation: appear 0.5s ease 1.0s both;
    }
  </style>

  <!-- bg -->
  <rect width="800" height="150" fill="#0d1117"/>

  <!-- glitch layers (behind name) -->
  <text class="glitch-r" x="40" y="100">IZ.</text>
  <text class="glitch-g" x="40" y="100">IZ.</text>

  <!-- main name -->
  <text class="name" x="40" y="100">IZ.</text>

  <!-- accent line draws on intro -->
  <line class="accent"
    x1="40" y1="115" x2="760" y2="115"
    stroke="#4493F8" stroke-width="1" stroke-linecap="round"/>

  <!-- traveling glow sweep, loops after intro -->
  <g clip-path="url(#lineclip)">
    <rect x="-100" y="112" width="100" height="6" fill="url(#sweep)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 900,0"
        dur="3.5s" begin="1.35s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1"/>
    </rect>
  </g>

  <!-- dot rides the line on intro, then fades -->
  <circle fill="#4493F8" r="3.5" cy="115">
    <animate attributeName="cx"
      from="40" to="760"
      dur="0.9s" begin="0.45s" fill="freeze"/>
    <animate attributeName="opacity"
      values="0;1;1;0"
      keyTimes="0;0.05;0.88;1"
      dur="0.9s" begin="0.45s" fill="freeze"/>
  </circle>

  <!-- resting dot at end — appears, then pulses quietly -->
  <circle cx="760" cy="115" r="3" fill="#4493F8" opacity="0">
    <animate attributeName="opacity"
      values="0;0;1" keyTimes="0;0.97;1"
      dur="1.35s" begin="0s" fill="freeze"/>
    <animate attributeName="r"
      values="3;5.5;3"
      dur="3s" begin="1.35s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity"
      values="1;0.25;1"
      dur="3s" begin="1.35s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>

  <!-- tagline -->
  <text class="sub" x="40" y="138">builds things · breaks things · fixes things · repeat</text>
</svg>
