name: update-readme

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 0 * * *"   # every day at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:       # run manually from Actions tab

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  update:
    runs-on: ubuntu-latest

    # loop prevention: don't re-run when the bot commits the generated files
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write      # needed to push the updated SVGs back

    steps:
      # ── 1. checkout ───────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. python ─────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── 3. generate ───────────────────────────────────────────────────────
      # GITHUB_TOKEN works for public repos.
      # For private repo stats, add a Personal Access Token (classic, "repo" scope)
      # as a repository secret named GH_TOKEN — the script will prefer it.
      - name: Generate SVG chapters
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GH_TOKEN: ${{ secrets.GH_TOKEN }}   # ← uncomment if you add a PAT
        run: python scripts/generate.py

      # ── 4. commit & push ──────────────────────────────────────────────────
      - name: Commit updated assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update profile stats [skip ci]"
            git push
          else
            echo "no changes — nothing to commit."
          fi
