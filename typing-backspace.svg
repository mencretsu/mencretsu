<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="760" height="60" viewBox="0 0 760 60" >
  <style>
    .t { font: 20px/1.2 Ubuntu, Arial, Helvetica, sans-serif; fill: #cbd5e1; }
    .bg { fill: transparent; }
  </style>

  <!-- background (transparent) -->
  <rect width="100%" height="100%" class="bg"/>

  <!-- The full line of text (final target). We will reveal/hide using mask -->
  <defs>
    <!-- mask named 'm' that we'll animate (rect width & x) -->
    <mask id="m">
      <!-- Start with nothing visible (rect width 0) -->
      <rect id="maskRect" x="0" y="0" width="0" height="60" fill="white" />
    </mask>
  </defs>

  <!-- Text we control with mask -->
  <text class="t" x="10" y="38" mask="url(#m)">
    welcome to iz's Github profile.
  </text>

  <!-- A static faint cursor (blink) -->
  <rect id="cursor" x="10" y="12" width="2.2" height="28" fill="#94a3b8">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite" />
  </rect>

  <!-- Animation sequence controlling maskRect -->
  <!--
    Timeline (seconds, approximate):
    0.00 -  1.00 : reveal "welcome to" (typing)
    1.00 -  1.40 : pause
    1.40 -  2.00 : backspace to "welcome" (hide right -> left)
    2.00 -  2.80 : reveal "hello welcome" (typing next variant)
    2.80 -  3.20 : pause
    3.20 -  3.80 : backspace to "welcome"
    3.80 -  4.60 : reveal "hi welcome"
    4.60 -  5.00 : pause
    5.00 -  5.60 : backspace to "welcome"
    5.60 -  7.40 : final reveal full "welcome to iz's Github profile."
    then pause and loop.
  -->
  <animate
    xlink:href="#maskRect"
    attributeName="width"
    from="0" to="220"
    begin="0s" dur="1s"
    fill="freeze" />

  <!-- pause -->
  <animate
    xlink:href="#maskRect"
    attributeName="width"
    from="220" to="220"
    begin="1s" dur="0.4s"
    fill="freeze" />

  <!-- backspace: shrink width to keep only 'welcome' -->
  <animate
    xlink:href="#maskRect"
    attributeName="width"
    from="220" to="140"
    begin="1.4s" dur="0.6s"
    fill="freeze" />

  <!-- reveal next variant 'hello welcome' (approx wider) -->
  <animate
    xlink:href="#maskRect"
    attributeName="width"
    from="140" to="255"
    begin="2.0s" dur="0.8s"
    fill="freeze" />

  <!-- pause -->
  <animate
    xlink:href="#maskRect"
    attributeName="width"
    from="255" to="255"
    begin="2.8s" dur="0.4s"
    fill="freeze" />

  <!-- backspace to 'welcome' again -->
  <animate
    xlink:href="#maskRect"
    attributeName="width"
    from="255" to="140"
    begin="3.2s" dur="0.6s"
    fill="freeze" />

  <!-- reveal 'hi welcome' -->
  <animate
    xlink:href="#maskRect"
    attributeName="width"
    from="140" to="200"
    begin="3.8s" dur="0.8s"
    fill="freeze" />

  <!-- pause -->
  <animate
    xlink:href="#maskRect"
    attributeName="width"
    from="200" to="200"
    begin="4.6s" dur="0.4s"
    fill="freeze" />

  <!-- backspace to 'welcome' again -->
  <animate
    xlink:href="#maskRect"
    attributeName="width"
    from="200" to="140"
    begin="5.0s" dur="0.6s"
    fill="freeze" />

  <!-- final reveal full sentence (longer width) -->
  <animate
    xlink:href="#maskRect"
    attributeName="width"
    from="140" to="700"
    begin="5.6s" dur="1.8s"
    fill="freeze" />

  <!-- Wait, then restart all (loop) -->
  <animate
    xlink:href="#maskRect"
    attributeName="width"
    from="700" to="0"
    begin="7.4s" dur="0.01s"
    fill="freeze" />

  <!-- Make whole animation loop by repeating the first animate -->
  <!-- We can't easily restart SMIL sequences across all animates with a single attribute,
       so instead we add a repeating invisible animate to force SVG to restart via restart="always" -->
  <animate attributeName="visibility" from="visible" to="visible" dur="7.5s" repeatCount="indefinite"/>
</svg>
